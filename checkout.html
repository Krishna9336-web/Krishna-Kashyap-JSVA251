<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxeStore | Checkout</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container navbar">
            <div class="logo">Luxe<span>Store</span></div>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="cart.html">Cart</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section>
        <div class="container">
            <h2 class="section-title">Checkout</h2>
            <div class="checkout-grid">
                
                <div class="form-container" style="max-width: 100%;">
                    <h3>Billing Details</h3>
                    <br>
                    <form>
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" placeholder="John Doe" required>
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" placeholder="john@example.com" required>
                        </div>
                        <div class="form-group">
                            <label>Address</label>
                            <input type="text" placeholder="123 Street Name" required>
                        </div>
                        <div class="form-group">
                            <label>City</label>
                            <input type="text" placeholder="New York" required>
                        </div>
                        <div class="form-group">
                            <label>Zip Code</label>
                            <input type="text" placeholder="10001" required>
                        </div>
                    </form>
                </div>

                <div class="cart-summary" style="height: fit-content;">
                    <h3>Order Summary</h3>
                    <p>Product 1 x 1: $199.99</p>
                    <p>Product 2 x 1: $249.99</p>
                    <hr>
                    <p><strong>Total: $494.97</strong></p>
                    <br>
                    <h3>Payment Method</h3>
                    <form>
                        <div class="form-group">
                            <input type="radio" id="credit" name="payment" checked>
                            <label for="credit" style="display:inline;">Credit Card</label>
                        </div>
                        <div class="form-group">
                            <input type="radio" id="paypal" name="payment">
                            <label for="paypal" style="display:inline;">PayPal</label>
                        </div>
                        <div class="form-group">
                            <input type="radio" id="cod" name="payment">
                            <label for="cod" style="display:inline;">Cash on Delivery</label>
                        </div>
                        <button type="submit" class="btn" style="width: 100%;">Place Order</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2023 LuxeStore. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
